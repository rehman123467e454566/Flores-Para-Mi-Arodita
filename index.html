<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña Preciosa 🌻</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .hud {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 90%;
        }
        .hud h1 { 
            font-size: 1.3rem; color: #ffeb3b; margin: 0; 
            text-shadow: 0 0 15px rgba(255,235,59,0.7); font-weight: bold; 
        }

        /* Botón de música visible para que el navegador no lo bloquee */
        #btn-musica {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(255, 235, 59, 0.2); border: 1px solid #ffeb3b;
            color: #ffeb3b; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem;
            cursor: pointer; backdrop-filter: blur(5px);
        }

        #video-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        #verse-overlay {
            display: none; position: fixed; inset: 0; z-index: 200;
            justify-content: center; align-items: center;
        }
        #verse-overlay.visible { display: flex; }
        .verse-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.9); }
        .verse-card {
            position: relative; max-width: 300px; width: 85%;
            background: #111; border: 2px solid #ffeb3b; border-radius: 15px;
            padding: 25px; text-align: center; color: #fff;
        }
        .verse-text { font-size: 1.1rem; color: #ffeb3b; margin-bottom: 20px; font-style: italic; }
        .verse-close { background: #ffeb3b; border: none; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="video-container">
        <iframe id="player" width="10" height="10" src="https://www.youtube.com/embed/rpDgBiVopiU?start=149&enablejsapi=1" frameborder="0"></iframe>
    </div>

    <button id="btn-musica" onclick="toggleMusica()">Pulsar para música 🎵</button>

    <div class="hud">
        <h1>Para Tí Mi Reencarnación Del Afrodita,<br>Feliz Día De Flores Amarillas Mi Niña Preciosa</h1>
    </div>

    <div id="verse-overlay" onclick="closeVerse()">
        <div class="verse-backdrop"></div>
        <div class="verse-card" onclick="event.stopPropagation()">
            <p class="verse-text" id="vText"></p>
            <button class="verse-close" onclick="closeVerse()">Te amo ❤️</button>
        </div>
    </div>

    <canvas id="gc"></canvas>

    <script>
    'use strict';
    
    // Música Control
    let sonando = false;
    function toggleMusica() {
        const iframe = document.getElementById('player');
        const btn = document.getElementById('btn-musica');
        if(!sonando) {
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            btn.innerHTML = "Música ON ✨";
            sonando = true;
        }
    }

    const FOTOS = [
        "https://i.ibb.co/bgY2FgwW/187164.jpg",
        "https://i.ibb.co/sYwgnzR/187163.jpg",
        "https://i.ibb.co/tTvZGtW9/187162.jpg",
        "https://i.ibb.co/B2gDvwxw/187161.jpg"
    ];

    const FRASES = [
        "Eres el regalo más lindo de mi vida 🌻", 
        "Tu sonrisa es mi sol diario ☀️",
        "Mi flor favorita eres tú 💛", 
        "Te amo más que a nada ✨",
        "Eres mi reencarnación de Afrodita 💫",
        "Mi niña preciosa, te adoro 💖"
    ];

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const imgObjs = FOTOS.map(url => { const img = new Image(); img.src = url; return img; });

    const N = 1200; 
    const px = [], py = [], pz = [], typ = [], cont = [], sizes = [], sx_list = [], sy_list = [];

    for (let i = 0; i < N; i++) {
        let r = Math.random() * 1500 + 100;
        let a = Math.random() * Math.PI * 2;
        px.push(Math.cos(a) * r);
        py.push(Math.sin(a) * r);
        pz.push((Math.random() - 0.5) * 600);
        sizes.push(Math.random() * 1.5 + 0.5);
        
        if (i < 4) { typ.push(4); cont.push(imgObjs[i]); } 
        else if (i % 40 === 0) { typ.push(3); cont.push("🌻"); }
        else if (i % 100 === 0) { typ.push(2); cont.push("💖"); }
        else { typ.push(Math.random() > 0.8 ? 1 : 0); }
    }

    let rot = 0, pitch = 1.1, zoom = 1100;
    let dragging = false, lx, ly;

    function showVerse() {
        document.getElementById('vText').textContent = FRASES[Math.floor(Math.random() * FRASES.length)];
        document.getElementById('verse-overlay').classList.add('visible');
    }
    function closeVerse() { document.getElementById('verse-overlay').classList.remove('visible'); }

    canvas.onpointerdown = e => { dragging = true; lx = e.clientX; ly = e.clientY; };
    canvas.onpointermove = e => {
        if (!dragging) return;
        rot -= (e.clientX - lx) * 0.005;
        pitch = Math.max(0.2, Math.min(3, pitch - (e.clientY - ly) * 0.005));
        lx = e.clientX; ly = e.clientY;
    };
    canvas.onpointerup = e => {
        dragging = false;
        for(let i=0; i<N; i++) {
            if(typ[i] >= 2 && Math.hypot(e.clientX - sx_list[i], e.clientY - sy_list[i]) < 40) { showVerse(); break; }
        }
    };

    function frame() {
        requestAnimationFrame(frame);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
        if(!dragging) rot += 0.001;

        const cr = Math.cos(rot), sr = Math.sin(rot), cp = Math.cos(pitch), sp = Math.sin(pitch);

        // Saturno Central
        let ds_sol = 600 / (600 + zoom);
        ctx.fillStyle = "#ffeb3b"; ctx.beginPath(); ctx.arc(W/2, H/2, 40*ds_sol, 0, 7); ctx.fill();
        for(let a=0; a<6; a++) {
            ctx.strokeStyle = "rgba(255,235,59,0.3)";
            ctx.beginPath(); ctx.ellipse(W/2, H/2, (90+a*12)*ds_sol, (30+a*4)*ds_sol, pitch-1.1, 0, 7); ctx.stroke();
        }

        for (let i = 0; i < N; i++) {
            let x = px[i]*cr - py[i]*sr;
            let y = px[i]*sr + py[i]*cr;
            let z = y*sp + pz[i]*cp;
            let ds = 600 / (600 + z + zoom);
            let sx = W/2 + x*ds, sy = H/2 + (y*cp - pz[i]*sp)*ds;
            sx_list[i] = sx; sy_list[i] = sy;

            if (typ[i] === 4) {
                let s = 80 * ds;
                if(cont[i].complete) ctx.drawImage(cont[i], sx-s/2, sy-s/2, s, s);
            } else if (typ[i] >= 2) {
                ctx.font = (20*ds)+"px Arial"; ctx.fillText(cont[i], sx, sy);
            } else {
                ctx.fillStyle = typ[i] === 1 ? "#ffeb3b" : "#fff";
                ctx.beginPath(); ctx.arc(sx, sy, sizes[i]*ds, 0, 7); ctx.fill();
            }
        }
    }
    frame();
    </script>
</body>
</html>
