<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña Preciosa 🌻</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 90%;
        }
        .hud h1 { 
            font-size: 1.4rem; color: #ffeb3b; margin: 0; 
            text-shadow: 0 0 15px rgba(255,235,59,0.7); 
            font-weight: bold; line-height: 1.3; 
        }
        .hud p { font-size: 0.75rem; color: rgba(255, 235, 59, 0.7); margin: 8px 0 0; }

        #video-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        #verse-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            justify-content: center; align-items: center;
        }
        #verse-overlay.visible { display: flex; }
        .verse-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .verse-card {
            position: relative; max-width: 320px; width: 85%;
            background: linear-gradient(145deg, #1a1000, #000);
            border: 2px solid #ffeb3b; border-radius: 20px;
            padding: 30px 20px; text-align: center; color: #fff;
            box-shadow: 0 0 50px rgba(255,235,59,0.4);
            animation: verseIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes verseIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .verse-text { font-size: 1.2rem; line-height: 1.5; font-style: italic; color: #ffeb3b; margin-bottom: 20px; }
        .verse-close { background: #ffeb3b; border: none; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-container">
        <iframe id="musica" width="100" height="100" src="https://www.youtube.com/embed/rpDgBiVopiU?start=149&enablejsapi=1" frameborder="0"></iframe>
    </div>

    <div class="hud">
        <h1>Para Tí Mi Reencarnación Del Afrodita,<br>Feliz Día De Flores Amarillas Mi Niña Preciosa</h1>
        <p>Toca la pantalla para la música 🎶 • Gira • Zoom • Toca las fotos 🌻</p>
    </div>

    <div id="verse-overlay" onclick="closeVerse()">
        <div class="verse-backdrop"></div>
        <div class="verse-card" onclick="event.stopPropagation()">
            <span id="vEmoji" style="font-size: 3rem; display: block; margin-bottom: 10px;">🌻</span>
            <p class="verse-text" id="vText"></p>
            <button class="verse-close" onclick="closeVerse()">Te amo ❤️</button>
        </div>
    </div>

    <canvas id="gc"></canvas>

    <script>
    'use strict';
    const FOTOS_URLS = [
        "https://i.ibb.co/bgY2FgwW/187164.jpg",
        "https://i.ibb.co/sYwgnzR/187163.jpg",
        "https://i.ibb.co/tTvZGtW9/187162.jpg",
        "https://i.ibb.co/B2gDvwxw/187161.jpg"
    ];

    const FRASES = [
        "Eres el regalo más lindo de mi vida 🌻", 
        "Tu sonrisa es mi sol diario ☀️",
        "Mi flor favorita eres tú 💛", 
        "Te amo más que a nada ✨",
        "Eres mi reencarnación de Afrodita 💫",
        "Mi niña preciosa, te adoro 💖",
        "Eres pura magia en mi vida 🤍"
    ];

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d', { alpha: false });
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const imgs = FOTOS_URLS.map(url => { const img = new Image(); img.crossOrigin = "anonymous"; img.src = url; return img; });

    const N = 1800; 
    const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
    const typ = new Uint8Array(N); // 0: blanca, 1: amarilla, 2: texto, 3: emoji, 4: foto
    const size = new Float32Array(N);
    const cont = new Array(N);
    const scx = new Float32Array(N), scy = new Float32Array(N);

    for (let i = 0; i < N; i++) {
        let r = Math.random() * 1500 + 100;
        let a = Math.random() * Math.PI * 2;
        px[i] = Math.cos(a) * r;
        py[i] = Math.sin(a) * r;
        pz[i] = (Math.random() - 0.5) * 600;
        size[i] = Math.random() * 1.5 + 0.5;
        
        if (i < 4) { typ[i] = 4; cont[i] = imgs[i]; } 
        else if (i % 80 === 0) { typ[i] = 2; cont[i] = "Te amo ❤️"; }
        else if (i % 30 === 0) { typ[i] = 3; cont[i] = (i % 60 === 0) ? "🌻" : "💖"; }
        else { typ[i] = (Math.random() > 0.7) ? 1 : 0; }
    }

    let rotT = 0, rotC = 0, pitT = 1.1, pitC = 1.1, zoom = 1100;
    const FOV = 600;
    let dragging = false, lastX = 0, lastY = 0, musicPlayed = false, moved = false;

    function showVerse() {
        document.getElementById('vText').textContent = FRASES[Math.floor(Math.random() * FRASES.length)];
        document.getElementById('verse-overlay').classList.add('visible');
    }
    function closeVerse() { document.getElementById('verse-overlay').classList.remove('visible'); }

    function playMusic() {
        if(!musicPlayed) {
            const iframe = document.getElementById('musica');
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            musicPlayed = true;
        }
    }

    // Eventos Mouse/Touch unificados
    const start = (x, y) => { dragging = true; lastX = x; lastY = y; moved = false; playMusic(); };
    const move = (x, y) => {
        if (!dragging) return;
        let dx = x - lastX, dy = y - lastY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
        rotT -= dx * 0.005; pitT = Math.max(0.2, Math.min(3, pitT - dy * 0.005));
        lastX = x; lastY = y;
    };

    canvas.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
    window.addEventListener('mouseup', e => { 
        if(!moved && dragging) {
            for(let i=0; i<N; i++) {
                if(typ[i] >= 2 && Math.hypot(e.clientX - scx[i], e.clientY - scy[i]) < 40) { showVerse(); break; }
            }
        }
        dragging = false; 
    });

    canvas.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    canvas.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    canvas.addEventListener('touchend', e => {
        if(!moved && dragging) {
            for(let i=0; i<N; i++) {
                if(typ[i] >= 2 && Math.hypot(lastX - scx[i], lastY - scy[i]) < 50) { showVerse(); break; }
            }
        }
        dragging = false;
    });

    function frame() {
        requestAnimationFrame(frame);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, H);
        rotC += (rotT - rotC) * 0.08; pitC += (pitT - pitC) * 0.08;
        if (!dragging) rotT += 0.0008;

        const cosR = Math.cos(rotC), sinR = Math.sin(rotC), cosP = Math.cos(pitC), sinP = Math.sin(pitC);

        let ds_sol = FOV / (FOV + zoom);
        ctx.shadowBlur = 40; ctx.shadowColor = "#ffeb3b"; ctx.fillStyle = "#ffeb3b";
        ctx.beginPath(); ctx.arc(W/2, H/2, 45 * ds_sol, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        for(let a=0; a<8; a++) { 
            ctx.strokeStyle = `rgba(255, 235, 59, ${0.4 - a*0.04})`; ctx.lineWidth = 2 * ds_sol;
            ctx.beginPath(); ctx.ellipse(W/2, H/2, (105 + a*15) * ds_sol, (32 + a*5) * ds_sol, pitC - 1.1, 0, 7); ctx.stroke();
        }

        for (let i = 0; i < N; i++) {
            let rx = px[i] * cosR - py[i] * sinR;
            let ry = px[i] * sinR + py[i] * cosR;
            let pz_rot = ry * sinP + pz[i] * cosP;
            let denom = FOV + pz_rot + zoom; if (denom < 1) continue;
            let ds = FOV / denom;
            let sx = W/2 + rx * ds, sy = H/2 + (ry * cosP - pz[i] * sinP) * ds;
            scx[i] = sx; scy[i] = sy;

            if (typ[i] === 4) { 
                let s = 100 * ds;
                ctx.strokeStyle = "#ffeb3b"; ctx.lineWidth = 3 * ds;
                ctx.save(); ctx.beginPath(); ctx.arc(sx, sy, s/2, 0, 7); ctx.stroke(); ctx.clip();
                if(cont[i].complete) ctx.drawImage(cont[i], sx - s/2, sy - s/2, s, s);
                ctx.restore();
            } else if (typ[i] === 3 || typ[i] === 2) { 
                ctx.font = (typ[i] === 3 ? 24 : 14) * ds + "px Arial";
                ctx.fillStyle = "#ffeb3b"; ctx.fillText(cont[i], sx, sy);
            } else { 
                ctx.fillStyle = typ[i] === 1 ? "#ffeb3b" : "#fff";
                ctx.beginPath(); ctx.arc(sx, sy, size[i] * ds, 0, 7); ctx.fill();
            }
        }
    }
    frame();
    </script>
</body>
</html>
