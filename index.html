<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña Preciosa 🌻</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        .hud {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 90%;
        }
        .hud h1 { 
            font-size: 1.4rem; color: #ffeb3b; margin: 0; 
            text-shadow: 0 0 15px rgba(255,235,59,0.7); 
            font-weight: bold; line-height: 1.3; 
        }
        .hud p { font-size: 0.75rem; color: rgba(255, 235, 59, 0.7); margin: 8px 0 0; font-weight: 400; }

        #video-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        #verse-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            justify-content: center; align-items: center;
        }
        #verse-overlay.visible { display: flex; }
        .verse-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .verse-card {
            position: relative; max-width: 320px; width: 85%;
            background: linear-gradient(145deg, #1a1000, #000);
            border: 2px solid #ffeb3b; border-radius: 20px;
            padding: 30px 20px; text-align: center; color: #fff;
            box-shadow: 0 0 50px rgba(255,235,59,0.4);
            animation: verseIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes verseIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .verse-text { font-size: 1.15rem; line-height: 1.5; font-style: italic; color: #ffeb3b; margin-bottom: 20px; }
        .verse-close { background: #ffeb3b; border: none; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-container">
        <iframe id="musica" width="100" height="100" src="https://www.youtube.com/embed/rpDgBiVopiU?start=149&autoplay=0&enablejsapi=1" frameborder="0"></iframe>
    </div>

    <div class="hud">
        <h1>Para Tí Mi Reencarnación Del Afrodita,<br>Feliz Día De Flores Amarillas Mi Niña Preciosa</h1>
        <p>Toca para iniciar música 🎶 • Gira • Zoom • Toca las flores 🌻</p>
    </div>

    <div id="verse-overlay">
        <div class="verse-backdrop" onclick="closeVerse()"></div>
        <div class="verse-card">
            <span id="vEmoji" style="font-size: 3rem; display: block; margin-bottom: 10px;">🌻</span>
            <p class="verse-text" id="vText"></p>
            <button class="verse-close" onclick="closeVerse()">Te amo ❤️</button>
        </div>
    </div>

    <canvas id="gc"></canvas>
    <script>
    'use strict';
    const FOTOS_URLS = [
        "https://i.ibb.co/bgY2FgwW/187164.jpg",
        "https://i.ibb.co/sYwgnzR/187163.jpg",
        "https://i.ibb.co/tTvZGtW9/187162.jpg",
        "https://i.ibb.co/B2gDvwxw/187161.jpg"
    ];

    const FRASES = ["Eres mi reina 👑", "Mi Diosa 🌟", "Te amo infinito ❤️", "Mágica ✨", "Eres mi sol ☀️"];
    const EMOJIS = ["🌻", "💖", "✨", "💐"];

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d', { alpha: false });
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // Carga de imágenes
    const imgs = FOTOS_URLS.map(url => { const img = new Image(); img.src = url; return img; });

    // --- ESTRELLAS Y ELEMENTOS ---
    const N = 1500; 
    const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
    const typ = new Uint8Array(N); // 0: blanca, 1: amarilla, 2: texto, 3: emoji, 4: foto
    const size = new Float32Array(N);
    const cont = new Array(N);
    const scx = new Float32Array(N), scy = new Float32Array(N);

    for (let i = 0; i < N; i++) {
        let r = Math.random() * 1500 + 100;
        let a = Math.random() * Math.PI * 2;
        px[i] = Math.cos(a) * r;
        py[i] = Math.sin(a) * r;
        pz[i] = (Math.random() - 0.5) * 600;
        size[i] = Math.random() * 1.6 + 0.4;
        
        if (i < 4) { typ[i] = 4; cont[i] = imgs[i]; } 
        else if (i % 70 === 0) { typ[i] = 2; cont[i] = FRASES[i % FRASES.length]; }
        else if (i % 25 === 0) { typ[i] = 3; cont[i] = EMOJIS[i % EMOJIS.length]; }
        else { typ[i] = (Math.random() > 0.75) ? 1 : 0; }
    }

    let rotT = 0, rotC = 0, pitT = 1.1, pitC = 1.1, zoom = 1100;
    const FOV = 600;
    let dragging = false, lastX = 0, lastY = 0, initialDist = 0, musicPlayed = false;

    // Iniciar Música al primer toque
    function playMusic() {
        if(!musicPlayed) {
            document.getElementById('musica').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            musicPlayed = true;
        }
    }

    canvas.addEventListener('touchstart', e => {
        playMusic();
        if (e.touches.length === 2) initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        else { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
    }, {passive:true});

    canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (initialDist > 0) zoom += (initialDist - dist) * 3;
            initialDist = dist; zoom = Math.max(300, Math.min(4500, zoom));
        } else if (dragging) {
            rotT -= (e.touches[0].clientX - lastX) * 0.005;
            pitT = Math.max(0.2, Math.min(3, pitT - (e.touches[0].clientY - lastY) * 0.005));
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    }, {passive:false});

    function frame() {
        requestAnimationFrame(frame);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, H);
        rotC += (rotT - rotC) * 0.08; pitC += (pitT - pitC) * 0.08;
        if (!dragging) rotT += 0.0007;

        const cosR = Math.cos(rotC), sinR = Math.sin(rotC), cosP = Math.cos(pitC), sinP = Math.sin(pitC);

        // SATURNO
        let ds_sol = FOV / (FOV + zoom);
        ctx.shadowBlur = 35; ctx.shadowColor = "#ffeb3b"; ctx.fillStyle = "#ffeb3b";
        ctx.beginPath(); ctx.arc(W/2, H/2, 42 * ds_sol, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        for(let a=0; a<8; a++) { 
            ctx.strokeStyle = `rgba(255, 235, 59, ${0.4 - a*0.04})`; ctx.lineWidth = 1.5 * ds_sol;
            ctx.beginPath(); ctx.ellipse(W/2, H/2, (95 + a*15) * ds_sol, (28 + a*5) * ds_sol, pitC - 1.1, 0, 7); ctx.stroke();
        }

        for (let i = 0; i < N; i++) {
            let rx = px[i] * cosR - py[i] * sinR;
            let ry = px[i] * sinR + py[i] * cosR;
            let pz_rot = ry * sinP + pz[i] * cosP;
            let denom = FOV + pz_rot + zoom; if (denom < 1) continue;
            let ds = FOV / denom;
            let sx = W/2 + rx * ds, sy = H/2 + (ry * cosP - pz[i] * sinP) * ds;

            if (typ[i] === 4) { // Fotos
                let s = 100 * ds;
                ctx.save(); ctx.beginPath(); ctx.arc(sx, sy, s/2, 0, 7); ctx.clip();
                ctx.drawImage(cont[i], sx - s/2, sy - s/2, s, s); ctx.restore();
            } else if (typ[i] === 3) { 
                ctx.font = 24 * ds + "px Arial"; ctx.fillText(cont[i], sx, sy);
            } else if (typ[i] === 2) { 
                ctx.fillStyle = "#ffeb3b"; ctx.font = "bold " + (14 * ds) + "px Arial"; ctx.fillText(cont[i], sx, sy);
            } else { 
                ctx.fillStyle = typ[i] === 1 ? "#ffeb3b" : "#fff";
                ctx.beginPath(); ctx.arc(sx, sy, size[i] * ds, 0, 7); ctx.fill();
            }
        }
    }
    frame();
    </script>
</body>
</html>
