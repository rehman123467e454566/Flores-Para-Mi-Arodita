<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña Preciosa 🌻</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        .hud {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 90%;
        }
        .hud h1 { 
            font-size: 1.4rem; color: #ffeb3b; margin: 0; 
            text-shadow: 0 0 15px rgba(255,235,59,0.7); font-weight: bold; line-height: 1.3;
        }
        .hud p { font-size: 0.75rem; color: rgba(255, 235, 59, 0.7); margin-top: 8px; }

        #verse-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            justify-content: center; align-items: center;
        }
        #verse-overlay.visible { display: flex; }
        .verse-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .verse-card {
            position: relative; max-width: 320px; width: 85%;
            background: linear-gradient(145deg, #1a1000, #000);
            border: 2px solid #ffeb3b; border-radius: 20px;
            padding: 30px 20px; text-align: center; color: #fff;
            box-shadow: 0 0 50px rgba(255,235,59,0.4);
        }
        .verse-text { font-size: 1.2rem; line-height: 1.5; font-style: italic; color: #ffeb3b; margin-bottom: 20px; }
        .verse-close { background: #ffeb3b; border: none; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <h1>Para Tí Mi Reencarnación Del Afrodita,<br>Feliz Día De Flores Amarillas Mi Niña Preciosa</h1>
        <p>Gira la galaxia • Zoom • Toca las fotos y flores 🌻</p>
    </div>

    <div id="verse-overlay" onclick="closeVerse()">
        <div class="verse-backdrop"></div>
        <div class="verse-card" onclick="event.stopPropagation()">
            <p class="verse-text" id="vText"></p>
            <button class="verse-close" onclick="closeVerse()">Te amo ❤️</button>
        </div>
    </div>

    <canvas id="gc"></canvas>

    <script>
    'use strict';
    
    const FOTOS_URLS = [
        "https://i.ibb.co/bgY2FgwW/187164.jpg",
        "https://i.ibb.co/sYwgnzR/187163.jpg",
        "https://i.ibb.co/tTvZGtW9/187162.jpg",
        "https://i.ibb.co/B2gDvwxw/187161.jpg"
    ];

    const FRASES_CARTAS = [
        "Eres el regalo más lindo de mi vida 🌻", 
        "Tu sonrisa es mi sol diario ☀️",
        "Mi flor favorita eres tú 💛", 
        "Te amo más que a nada ✨",
        "Eres mi reencarnación de Afrodita 💫",
        "Mi niña preciosa, te adoro 💖",
        "Contigo todo el universo es más bonito 🌹"
    ];

    const APODOS = ["Única 🌻", "Mi amor ❤️", "Preciosa ✨", "Te amo 💖", "Afrodita 🌟", "Mágica ✨", "Diosa 👑"];

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d', { alpha: false });
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const imgs = FOTOS_URLS.map(url => { const img = new Image(); img.crossOrigin = "anonymous"; img.src = url; return img; });

    const N = 1800; 
    const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
    const typ = new Uint8Array(N); // 0: blanca, 1: amarilla, 2: apodo, 3: emoji, 4: foto
    const size = new Float32Array(N);
    const cont = new Array(N);
    const sx_list = new Float32Array(N), sy_list = new Float32Array(N);

    for (let i = 0; i < N; i++) {
        let r = Math.random() * 1600 + 100;
        let a = Math.random() * Math.PI * 2;
        px[i] = Math.cos(a) * r;
        py[i] = Math.sin(a) * r;
        pz[i] = (Math.random() - 0.5) * 600;
        size[i] = Math.random() * 1.5 + 0.5;
        
        if (i < 4) { typ[i] = 4; cont[i] = imgs[i]; } 
        else if (i % 80 === 0) { typ[i] = 2; cont[i] = APODOS[i % APODOS.length]; }
        else if (i % 35 === 0) { typ[i] = 3; const ems = ["🌻", "💖", "✨", "💐"]; cont[i] = ems[i % ems.length]; }
        else { typ[i] = (Math.random() > 0.7) ? 1 : 0; }
    }

    let rotT = 0, rotC = 0, pitT = 1.1, pitC = 1.1, zoom = 1100;
    const FOV = 600;
    let dragging = false, lx, ly, moved = false;

    function showVerse() {
        document.getElementById('vText').textContent = FRASES_CARTAS[Math.floor(Math.random() * FRASES_CARTAS.length)];
        document.getElementById('verse-overlay').classList.add('visible');
    }
    function closeVerse() { document.getElementById('verse-overlay').classList.remove('visible'); }

    const hStart = (x, y) => { dragging = true; lx = x; ly = y; moved = false; };
    const hMove = (x, y) => {
        if (!dragging) return;
        let dx = x - lx, dy = y - ly;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
        rotT -= dx * 0.005; pitT = Math.max(0.2, Math.min(3, pitT - dy * 0.005));
        lx = x; ly = y;
    };
    const hEnd = (x, y) => {
        if(!moved && dragging) {
            for(let i=0; i<N; i++) {
                if(typ[i] >= 2 && Math.hypot(x - sx_list[i], y - sy_list[i]) < 45) { showVerse(); break; }
            }
        }
        dragging = false;
    };

    canvas.addEventListener('mousedown', e => hStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => hMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', e => hEnd(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => hStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    canvas.addEventListener('touchmove', e => hMove(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    canvas.addEventListener('touchend', e => hEnd(lx, ly));

    function frame() {
        requestAnimationFrame(frame);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, H);
        rotC += (rotT - rotC) * 0.08; pitC += (pitT - pitC) * 0.08;
        if (!dragging) rotT += 0.0008;

        const cr = Math.cos(rotC), sr = Math.sin(rotC), cp = Math.cos(pitC), sp = Math.sin(pitC);

        let ds_sol = FOV / (FOV + zoom);
        ctx.fillStyle = "#ffeb3b"; ctx.shadowBlur = 40; ctx.shadowColor = "#ffeb3b";
        ctx.beginPath(); ctx.arc(W/2, H/2, 45*ds_sol, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        for(let a=0; a<8; a++) {
            ctx.strokeStyle = `rgba(255,235,59,${0.35 - a*0.04})`; ctx.lineWidth = 2 * ds_sol;
            ctx.beginPath(); ctx.ellipse(W/2, H/2, (100+a*15)*ds_sol, (32+a*5)*ds_sol, pitC-1.1, 0, 7); ctx.stroke();
        }

        for (let i = 0; i < N; i++) {
            let rx = px[i]*cr - py[i]*sr, ry = px[i]*sr + py[i]*cr;
            let pz_rot = ry*sp + pz[i]*cp;
            let ds = FOV / (FOV + pz_rot + zoom);
            if (ds < 0) continue;
            let sx = W/2 + rx*ds, sy = H/2 + (ry*cp - pz[i]*sp)*ds;
            sx_list[i] = sx; sy_list[i] = sy;

            if (typ[i] === 4) {
                let s = 90 * ds;
                ctx.save(); ctx.beginPath(); ctx.arc(sx, sy, s/2, 0, 7); ctx.clip();
                if(cont[i].complete) ctx.drawImage(cont[i], sx-s/2, sy-s/2, s, s);
                ctx.restore();
                ctx.strokeStyle = "#ffeb3b"; ctx.lineWidth = 2*ds;
                ctx.beginPath(); ctx.arc(sx, sy, s/2, 0, 7); ctx.stroke();
            } else if (typ[i] === 2) {
                ctx.fillStyle = "#ffeb3b"; ctx.font = "bold "+(14*ds)+"px Arial"; ctx.fillText(cont[i], sx, sy);
            } else if (typ[i] === 3) {
                ctx.font = (22*ds)+"px Arial"; ctx.fillText(cont[i], sx, sy);
            } else {
                ctx.fillStyle = typ[i] === 1 ? "#ffeb3b" : "#fff";
                ctx.beginPath(); ctx.arc(sx, sy, size[i]*ds, 0, 7); ctx.fill();
            }
        }
    }
    frame();
    </script>
</body>
</html>
