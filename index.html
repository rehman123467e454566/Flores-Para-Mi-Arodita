<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Afrodita 🌻</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        .hud {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 95%;
        }
        .hud h1 { font-size: 1.7rem; color: #ffeb3b; margin: 0; text-shadow: 0 0 15px rgba(255,235,59,0.8); font-weight: bold; line-height: 1.2; }
        .hud h2 { font-size: 1.1rem; color: #fff; margin: 5px 0 8px; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-weight: 300; }
        /* Instrucciones más pequeñas como pediste */
        .hud p { font-size: 0.85rem; color: rgba(255, 235, 59, 0.9); margin: 1px 0; text-shadow: 1px 1px 2px #000; font-weight: 400; }

        #verse-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            justify-content: center; align-items: center;
        }
        #verse-overlay.visible { display: flex; }
        .verse-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); }
        .verse-card {
            position: relative; max-width: 340px; width: 88%;
            background: linear-gradient(145deg, #1a1000, #000);
            border: 2px solid #ffeb3b; border-radius: 20px;
            padding: 35px 25px; text-align: center; color: #fff;
            box-shadow: 0 0 50px rgba(255,235,59,0.4);
            animation: verseIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes verseIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .verse-text { font-size: 1.3rem; line-height: 1.6; font-style: italic; color: #ffeb3b; margin-bottom: 25px; }
        .verse-close { background: #ffeb3b; border: none; color: #000; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="hud">
        <h1>Para Tí Mi Reencarnación Del Afrodita</h1>
        <h2>Feliz Día De Flores Amarillas Mi Niña Preciosa</h2>
        <p>Desliza para girar • Pellizca para Zoom • Toca los ramos 🌻</p>
    </div>

    <div id="verse-overlay">
        <div class="verse-backdrop" onclick="closeVerse()"></div>
        <div class="verse-card">
            <span id="vEmoji" style="font-size: 3.5rem; display: block; margin-bottom: 10px;">🌻</span>
            <p class="verse-text" id="vText"></p>
            <button class="verse-close" onclick="closeVerse()">Te amo ❤️</button>
        </div>
    </div>

    <canvas id="gc"></canvas>
    <script>
    'use strict';
    const FRASES_CARTAS = [
        "Eres el regalo más lindo de mi vida 🌻", "Tu sonrisa es mi sol diario ☀️",
        "Mi flor favorita en el universo eres tú 💛", "Te amo más que a nada ✨",
        "Eres mi reencarnación de Afrodita 💫", "Siempre tú, mi amor 💍",
        "Eres pura magia en mi vida 🤍", "Mi mayor tesoro eres tú 💎",
        "Mi niña preciosa, te adoro 💖", "Contigo todo es más bonito 🌹"
    ];

    const MSGS_FLOTANTES = [
        "Única 🌻", "Mi amor ❤️", "Preciosa ✨", "Te amo 💖", "Mi vida 🌼", 
        "Afrodita 🌟", "Mi reina 👑", "Especial 💛", "Mágica ✨", "Divina 🌻",
        "Siempre tú 💖", "Mi luz ☀️", "Te adoro 😍", "Hermosa 🌹"
    ];

    const EMOJIS_CORAZONES = ["❤️", "💖", "✨", "💘", "💝", "💕"];

    const overlay = document.getElementById('verse-overlay');
    const vText = document.getElementById('vText');
    const vEmoji = document.getElementById('vEmoji');
    let verseOpen = false;

    function showVerse() {
        vText.textContent = FRASES_CARTAS[Math.floor(Math.random() * FRASES_CARTAS.length)];
        vEmoji.textContent = (Math.random() > 0.5) ? "🌻" : "💖";
        overlay.classList.add('visible');
        verseOpen = true;
    }
    function closeVerse() { overlay.classList.remove('visible'); verseOpen = false; }

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d', { alpha: false });
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // --- 3,500 ESTRELLAS + FLORES + CORAZONES ---
    const N = 3500; 
    const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
    const typ = new Uint8Array(N); 
    const cont = new Array(N);
    const scx = new Float32Array(N), scy = new Float32Array(N);

    for (let i = 0; i < N; i++) {
        let r = Math.random() * 1600 + 100;
        let a = Math.random() * Math.PI * 2;
        px[i] = Math.cos(a) * r;
        py[i] = Math.sin(a) * r;
        pz[i] = (Math.random() - 0.5) * 600;
        
        if (i % 100 === 0) { typ[i] = 2; cont[i] = MSGS_FLOTANTES[i % MSGS_FLOTANTES.length]; }
        else if (i % 25 === 0) { typ[i] = 1; cont[i] = "🌻"; }
        else if (i % 140 === 0) { typ[i] = 3; cont[i] = "💐🌻"; } 
        else if (i % 35 === 0) { typ[i] = 4; cont[i] = EMOJIS_CORAZONES[Math.floor(Math.random()*EMOJIS_CORAZONES.length)]; }
        else { typ[i] = 0; } 
    }

    let rotT = 0, rotC = 0, pitT = 1.1, pitC = 1.1, zoom = 900;
    const FOV = 600;

    let dragging = false, lastX = 0, lastY = 0, initialDist = 0, tapMoved = false;

    canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; tapMoved = false; });
    window.addEventListener('mousemove', e => {
        if (!dragging || verseOpen) return;
        let dx = e.clientX - lastX, dy = e.clientY - lastY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) tapMoved = true;
        rotT -= dx * 0.005; pitT = Math.max(0.2, Math.min(Math.PI - 0.2, pitT - dy * 0.005));
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup', () => dragging = false);

    canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        } else {
            dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; tapMoved = false;
        }
    }, {passive:true});

    canvas.addEventListener('touchmove', e => {
        if (verseOpen) return;
        if (e.touches.length === 2) {
            let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (initialDist > 0) zoom += (initialDist - dist) * 3;
            initialDist = dist;
            zoom = Math.max(100, Math.min(5000, zoom));
        } else if (dragging) {
            let dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) tapMoved = true;
            rotT -= dx * 0.005; pitT = Math.max(0.2, Math.min(Math.PI - 0.2, pitT - dy * 0.005));
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    }, {passive:false});

    canvas.addEventListener('touchend', e => { dragging = false; initialDist = 0; });
    canvas.addEventListener('wheel', e => { zoom = Math.max(100, Math.min(5000, zoom + e.deltaY)); }, {passive:true});

    function frame() {
        requestAnimationFrame(frame);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, H);
        rotC += (rotT - rotC) * 0.08; pitC += (pitT - pitC) * 0.08;
        if (!dragging) rotT += 0.001;

        const cosR = Math.cos(rotC), sinR = Math.sin(rotC), cosP = Math.cos(pitC), sinP = Math.sin(pitC);

        // --- SOL CON 8 ANILLOS PLANOS (SATURNO) ---
        let ds_sol = FOV / (FOV + zoom);
        ctx.shadowBlur = 45; ctx.shadowColor = "#ffeb3b";
        ctx.fillStyle = "#ffeb3b";
        ctx.beginPath(); ctx.arc(W/2, H/2, 48 * ds_sol, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        
        for(let a=0; a<8; a++) { 
            ctx.strokeStyle = `rgba(255, 235, 59, ${0.45 - a*0.05})`;
            ctx.lineWidth = (2.5 - a*0.2) * ds_sol;
            ctx.beginPath(); 
            // Inclinación fija para que parezca Saturno
            ctx.ellipse(W/2, H/2, (100 + a*15) * ds_sol, (32 + a*5) * ds_sol, pitC - 1.1, 0, 7); 
            ctx.stroke();
        }

        for (let i = 0; i < N; i++) {
            let rx = px[i] * cosR - py[i] * sinR;
            let ry = px[i] * sinR + py[i] * cosR;
            let pz_rot = ry * sinP + pz[i] * cosP;
            let denom = FOV + pz_rot + zoom;
            if (denom < 1) continue;
            let ds = FOV / denom;
            let sx = W/2 + rx * ds;
            let sy = H/2 + (ry * cosP - pz[i] * sinP) * ds;

            if (typ[i] === 1 || typ[i] === 3 || typ[i] === 4) { 
                ctx.font = (typ[i] === 3 ? 45 : 22) * ds + "px Arial";
                ctx.fillText(cont[i], sx, sy);
                scx[i] = sx; scy[i] = sy;
            } else if (typ[i] === 2) { 
                ctx.fillStyle = "#ffeb3b"; ctx.font = "bold " + (16 * ds) + "px Arial";
                ctx.fillText(cont[i], sx, sy);
            } else { 
                ctx.fillStyle = "rgba(255,255,255,0.95)"; 
                ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.4, 1.2 * ds), 0, 7); ctx.fill();
            }
        }
    }
    
    canvas.addEventListener('click', e => {
        if (tapMoved) return;
        for (let i = 0; i < N; i++) {
            if ((typ[i] === 1 || typ[i] === 3 || typ[i] === 4) && Math.hypot(e.clientX - scx[i], e.clientY - scy[i]) < 40) { showVerse(); break; }
        }
    });
    frame();
    </script>
</body>
</html>
